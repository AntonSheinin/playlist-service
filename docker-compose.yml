services:
  playlist-service:
    build: .
    container_name: playlist-service
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - DB_POOL_SIZE=${DB_POOL_SIZE:?DB_POOL_SIZE is required}
      - DB_MAX_OVERFLOW=${DB_MAX_OVERFLOW:?DB_MAX_OVERFLOW is required}
      - DB_POOL_TIMEOUT=${DB_POOL_TIMEOUT:?DB_POOL_TIMEOUT is required}
      - DB_ECHO=${DB_ECHO:?DB_ECHO is required}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - SESSION_TIMEOUT=${SESSION_TIMEOUT:?SESSION_TIMEOUT is required}
      - FLUSSONIC_URL=${FLUSSONIC_URL-}
      - FLUSSONIC_USERNAME=${FLUSSONIC_USERNAME-}
      - FLUSSONIC_PASSWORD=${FLUSSONIC_PASSWORD-}
      - FLUSSONIC_TIMEOUT=${FLUSSONIC_TIMEOUT-60}
      - FLUSSONIC_PAGE_LIMIT=${FLUSSONIC_PAGE_LIMIT-500}
      - WMSPANEL_API_URL=${WMSPANEL_API_URL-}
      - WMSPANEL_CLIENT_ID=${WMSPANEL_CLIENT_ID-}
      - WMSPANEL_API_KEY=${WMSPANEL_API_KEY-}
      - WMSPANEL_SERVER_ID=${WMSPANEL_SERVER_ID-}
      - NIMBLE_TIMEOUT=${NIMBLE_TIMEOUT-30}
      - NIMBLE_PLAYBACK_URL=${NIMBLE_PLAYBACK_URL-}
      - NIMBLE_APPLICATION=${NIMBLE_APPLICATION-live}
      - NIMBLE_PLAYLIST_PATH=${NIMBLE_PLAYLIST_PATH-playlist.m3u8}
      - NIMBLE_TOKEN_QUERY_PARAM=${NIMBLE_TOKEN_QUERY_PARAM-token}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:?AUTH_SERVICE_URL is required}
      - AUTH_SERVICE_API_KEY=${AUTH_SERVICE_API_KEY:?AUTH_SERVICE_API_KEY is required}
      - AUTH_SERVICE_TIMEOUT=${AUTH_SERVICE_TIMEOUT:?AUTH_SERVICE_TIMEOUT is required}
      - EPG_SERVICE_URL=${EPG_SERVICE_URL:?EPG_SERVICE_URL is required}
      - EPG_SERVICE_TIMEOUT=${EPG_SERVICE_TIMEOUT:?EPG_SERVICE_TIMEOUT is required}
      - EPG_SERVICE_FETCH_TIMEOUT=${EPG_SERVICE_FETCH_TIMEOUT:?EPG_SERVICE_FETCH_TIMEOUT is required}
      - RUTV_SITE_URL=${RUTV_SITE_URL:?RUTV_SITE_URL is required}
      - RUTV_STATS_TOKEN=${RUTV_STATS_TOKEN:?RUTV_STATS_TOKEN is required}
      - RUTV_SITE_TIMEOUT=${RUTV_SITE_TIMEOUT:?RUTV_SITE_TIMEOUT is required}
      - BASE_URL=${BASE_URL:?BASE_URL is required}
      - API_HOST=${API_HOST:?API_HOST is required}
      - API_PORT=${API_PORT:?API_PORT is required}
      - PAGINATION_DEFAULT_PER_PAGE=${PAGINATION_DEFAULT_PER_PAGE:?PAGINATION_DEFAULT_PER_PAGE is required}
      - PAGINATION_MAX_PER_PAGE=${PAGINATION_MAX_PER_PAGE:?PAGINATION_MAX_PER_PAGE is required}
      - LOOKUP_DEFAULT_LIMIT=${LOOKUP_DEFAULT_LIMIT:?LOOKUP_DEFAULT_LIMIT is required}
      - LOOKUP_MAX_LIMIT=${LOOKUP_MAX_LIMIT:?LOOKUP_MAX_LIMIT is required}
      - TOKEN_LENGTH=${TOKEN_LENGTH:?TOKEN_LENGTH is required}
      - LOG_LEVEL=${LOG_LEVEL:?LOG_LEVEL is required}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./media:/app/media
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - playlist-network
      - auth-backend_default

  postgres:
    image: postgres:15-alpine
    container_name: playlist-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER is required}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playlist -d playlist_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - playlist-network

volumes:
  postgres_data:

networks:
  playlist-network:
    driver: bridge
  auth-backend_default:
    external: true
