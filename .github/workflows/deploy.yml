name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/antonsheinin/playlist-service:latest
  DEPLOY_HOST: 46.224.52.226
  DEPLOY_USER: anton
  DEPLOY_PATH: /home/anton/playlist_service

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Create remote deploy directory
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"

      - name: Sync compose file and media
        run: |
          set -euo pipefail
          rsync -az -e "ssh -i ~/.ssh/deploy_key" docker-compose.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.yml"
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" media/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/media/"

      - name: Deploy on server
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_SUDO_PASSWORD: ${{ secrets.DEPLOY_SUDO_PASSWORD }}
        run: |
          set -euo pipefail
          {
            printf 'export GHCR_USERNAME=%q\n' "$GHCR_USERNAME"
            printf 'export GHCR_TOKEN=%q\n' "$GHCR_TOKEN"
            printf 'export DEPLOY_SUDO_PASSWORD=%q\n' "$DEPLOY_SUDO_PASSWORD"
            printf 'export DEPLOY_PATH=%q\n' "$DEPLOY_PATH"
            cat <<'EOF'
          set -euo pipefail

          cd "$DEPLOY_PATH"

          test -f .env || {
            echo "Missing $DEPLOY_PATH/.env. Copy it manually before deploying."
            exit 1
          }

          echo "$DEPLOY_SUDO_PASSWORD" | sudo -S -p '' -v

          echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

          sudo docker compose pull playlist-service
          sudo docker compose up -d --no-build --force-recreate playlist-service
          sudo docker compose exec -T playlist-service alembic upgrade head

          sudo docker compose ps
          curl -fsS http://localhost:8080/health
          EOF
          } | ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" bash
